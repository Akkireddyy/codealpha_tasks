<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Language Translation Tool</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <div class="container">

        <h1>Language Translation Tool</h1>

        <!-- Input Section -->
        <div class="input-section">

            <label for="inputText">
                Enter Text
            </label>

            <textarea
                id="inputText"
                placeholder="Type something here..."
            ></textarea>

        </div>

        <!-- Language Selection -->
        <div class="language-section">

            <div class="dropdown-box">

                <label for="sourceLang">
                    Source Language
                </label>

                <select id="sourceLang"> </select>

                    <!-- <option value="en">English</option>
                    <option value="te">Telugu</option>
                    <option value="hi">Hindi</option>
                    <option value="fr">French</option>
                    <option value="es">Spanish</option> -->


            </div>

            <div class="dropdown-box">

                <label for="targetLang">
                    Target Language
                </label>

                <select id="targetLang"> </select>

                    <!-- <option value="te">Telugu</option>
                    <option value="en">English</option>
                    <option value="hi">Hindi</option>
                    <option value="fr">French</option>
                    <option value="es">Spanish</option> -->


            </div>

        </div>

        <button id="translateBtn">
    🌐 Translate
          </button>

       <button id="swapBtn">
    🔄 Swap Languages
       </button>
        <!-- Output Section -->
      <div class="output-section">

    <label for="outputText">
        Translated Text
    </label>

    <div class="textarea-container">

        <textarea
            id="outputText"
            readonly
            placeholder="Translated text will appear here..."
        ></textarea>

        <button id="copyBtn">
            copy
        </button>

    </div>

</div>


    <div class="button-group">
<button id="speakBtn">
    🔊 Speak
</button>

<button id="clearBtn">
    Clear
</button>
</div>
    </div>
    <div class="side-text">

    <h2>Translate Instantly 🌐</h2>

    <p>
        Translate text across multiple
        languages with speech support,
        copy feature, and responsive UI.
    </p>

</div>

    <script src="script.js"></script>

</body>

</html>
